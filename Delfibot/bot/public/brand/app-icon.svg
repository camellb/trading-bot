<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <radialGradient id="lift" cx="50%" cy="38%" r="60%">
      <stop offset="0%"  stop-color="#1a1a24" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#06060a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Obsidian plate. macOS will mask this to a squircle. -->
  <rect width="1024" height="1024" fill="#0a0a0f"/>
  <rect width="1024" height="1024" fill="url(#lift)"/>

  <!-- Concentric oracle rings, bold enough to read at 32px. -->
  <g stroke-linecap="round" fill="none">
    <circle cx="512" cy="512" r="380" stroke="#00FFFF" stroke-opacity="0.18" stroke-width="3"/>
    <circle cx="512" cy="512" r="320" stroke="#00FFFF" stroke-opacity="0.45" stroke-width="14"/>
    <circle cx="512" cy="512" r="220" stroke="#00FFFF" stroke-opacity="0.85" stroke-width="14"/>
  </g>

  <!-- Tripod / Y mark in vellum, anchored inside the inner ring. -->
  <g stroke="#E8E4D8" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 512 256 L 512 600"/>
    <path d="M 512 600 L 360 760"/>
    <path d="M 512 600 L 664 760"/>
  </g>

  <!-- Gold pythia disc with soft halo. -->
  <circle cx="512" cy="512" r="58" fill="#D4AF37"/>
  <circle cx="512" cy="512" r="58" fill="none" stroke="#D4AF37" stroke-opacity="0.35" stroke-width="20"/>
</svg>

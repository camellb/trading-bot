# Railway service config for the Delfi bot.
#
# Set the service's Root Directory to `apps/bot` in the Railway dashboard so
# Nixpacks picks up requirements.txt and main.py from this directory.
#
# Deploy-time env vars come from apps/bot/.env.example — configure them in
# the service's Variables tab, not here.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python main.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/api/health"
healthcheckTimeout = 30

# Single long-running worker — the bot is a stateful scheduler, not a
# horizontally scalable service. Do not scale replicas > 1.
numReplicas = 1

name: Build

# Cross-platform Tauri + PyInstaller build. Produces a macOS .app/.dmg
# and a Windows .msi/.exe per push to main and on demand. Lets us ship
# Windows artifacts without owning a Windows machine.
#
# Code signing:
#  - macOS: ad-hoc signed (codesign --deep --sign -). With Tauri 2's
#    default settings the .app ends up with a linker-level signature
#    but no _CodeSignature/CodeResources seal, which Apple Silicon
#    Gatekeeper rejects as "Delfi is damaged and can't be opened".
#    The macOS-only re-sign step below runs the proper deep ad-hoc
#    sign + repackages the DMG and the updater .app.tar.gz from the
#    sealed bundle. Result: first-launch shows the "developer cannot
#    be verified" warning instead of "damaged" - right-click Open
#    works and no Terminal incantation is needed.
#  - Windows: not signed. SmartScreen will warn on first launch.
#    Proper Authenticode signing needs a paid cert and is deferred.
#  - The Windows binary is verified by a headless smoke test that
#    launches the sidecar and hits /api/state. UI rendering (the Tauri
#    webview side) is NOT exercised. That needs a real Windows
#    desktop session, which Actions runners don't provide for free.

on:
  push:
    branches: [main]
    tags:    ['v*']
  workflow_dispatch:
  pull_request:
    branches: [main]

# Don't pile up parallel builds on rapid pushes. Last one wins.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            sidecar_src: dist/delfi-sidecar
            sidecar_dst: src-tauri/binaries/delfi-sidecar-aarch64-apple-darwin
            tauri_bundles: app,dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_src: dist/delfi-sidecar.exe
            sidecar_dst: src-tauri/binaries/delfi-sidecar-x86_64-pc-windows-msvc.exe
            tauri_bundles: nsis,msi

    defaults:
      run:
        # Force bash everywhere so the shell snippets work identically
        # on macos-latest and windows-latest. windows-latest ships Git
        # Bash; this routes through it.
        shell: bash
        working-directory: Delfibot/bot

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: Delfibot/bot/pyproject.toml

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Delfibot/bot/package-lock.json

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Delfibot/bot/src-tauri/target
          key: cargo-${{ matrix.os }}-${{ hashFiles('Delfibot/bot/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.os }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build Python sidecar (PyInstaller)
        run: |
          rm -rf build dist
          python -m PyInstaller scripts/delfi_sidecar.spec --noconfirm

      - name: Stage sidecar at Tauri externalBin path
        run: |
          mkdir -p src-tauri/binaries
          cp "${{ matrix.sidecar_src }}" "${{ matrix.sidecar_dst }}"
          # POSIX hosts need exec bit; Windows ignores it.
          chmod +x "${{ matrix.sidecar_dst }}" 2>/dev/null || true
          ls -la src-tauri/binaries/

      - name: Smoke test sidecar (headless)
        run: |
          # Launch the sidecar with a deterministic port + temp DB,
          # poll stdout for DELFI_LOCAL_API_READY, hit /api/state, then
          # tear it down. Catches "the binary doesn't even boot" before
          # we waste runner minutes on the Tauri build.
          export DELFI_PORT=18994
          export DELFI_DB_PATH="${{ runner.temp }}/smoke.db"
          BIN="${{ matrix.sidecar_dst }}"
          BIN="$(cd "$(dirname "$BIN")" && pwd)/$(basename "$BIN")"
          echo "[smoke] launching $BIN"
          "$BIN" > smoke.stdout 2> smoke.stderr &
          PID=$!
          READY=""
          for i in $(seq 1 90); do
            if grep -q "DELFI_LOCAL_API_READY" smoke.stdout 2>/dev/null; then
              READY="yes"
              echo "[smoke] sidecar ready after ${i}s"
              break
            fi
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "[smoke] sidecar exited before ready"
              break
            fi
            sleep 1
          done
          if [[ "$READY" != "yes" ]]; then
            echo "[smoke] FAILED: never printed ready line"
            echo "--- stdout ---"; cat smoke.stdout || true
            echo "--- stderr ---"; cat smoke.stderr || true
            kill -KILL "$PID" 2>/dev/null || true
            exit 1
          fi
          CODE=$(curl -sS --max-time 5 -o /dev/null -w "%{http_code}" "http://127.0.0.1:${DELFI_PORT}/api/state" || echo "000")
          echo "[smoke] GET /api/state -> $CODE"
          # Tear down. Best effort. Windows kill is finicky in Git Bash.
          kill -TERM "$PID" 2>/dev/null || true
          sleep 2
          kill -KILL "$PID" 2>/dev/null || true
          if [[ "$CODE" != "200" ]]; then
            echo "[smoke] FAILED: non-200"
            echo "--- stderr ---"; cat smoke.stderr || true
            exit 1
          fi

      - name: Install Node dependencies
        run: npm ci

      - name: Clean stale bundle output
        # The cargo cache (above) restores `target/` between runs to
        # speed up Rust compilation. That cache also includes
        # `target/release/bundle/{dmg,nsis,msi,macos}/`, which holds
        # PER-VERSION installer filenames like `Delfi_0.1.0_x64-setup.exe`.
        # Without wiping, the next build's upload-artifact glob picks
        # up BOTH the freshly-built `Delfi_1.5.0_*` and the stale
        # `Delfi_0.1.0_*` from cache, and they all land in the
        # GitHub Release. The compile cache under target/release/deps
        # + target/release/build is left intact so the Rust build
        # stays incremental.
        run: |
          rm -rf src-tauri/target/release/bundle || true

      - name: Build Tauri app
        # The Tauri build re-runs the frontend build (vite) via its
        # beforeBuildCommand and then bundles per-platform. When
        # TAURI_SIGNING_PRIVATE_KEY is set, the bundler signs each
        # artifact (Ed25519 minisign), emits a .sig file alongside,
        # and produces the per-platform updater bundle
        # (.app.tar.gz on mac, .nsis.zip on Windows) so the
        # tauri-plugin-updater can verify before in-place install.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri build -- --bundles ${{ matrix.tauri_bundles }}

      - name: macOS — properly seal the .app, rebuild DMG + updater bundle
        # Apple Silicon Gatekeeper rejects Tauri's default macOS output
        # as "Delfi is damaged and can't be opened" because the bundle
        # has a linker-level ad-hoc signature on the inner Mach-O but no
        # _CodeSignature/CodeResources seal on the bundle itself. Verified
        # with `codesign -dv` on the v1.5.2 release asset which shows
        # `Sealed Resources=none` and `code has no resources but signature
        # indicates they must be present` (the exact phrasing Gatekeeper
        # reports as "damaged").
        #
        # Fix: strip Tauri's broken signature and re-sign properly with
        # `codesign --force --deep --sign -`. --deep also signs the
        # nested PyInstaller sidecar binary at Contents/MacOS/delfi-sidecar.
        # After re-signing the DMG and the updater tar.gz must be rebuilt
        # from the now-sealed .app, and the tar.gz re-signed with the
        # Tauri minisign key so the auto-updater still trusts it.
        if: matrix.os == 'macos-latest'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          set -euo pipefail
          APP_DIR=src-tauri/target/release/bundle/macos
          DMG_DIR=src-tauri/target/release/bundle/dmg
          APP=$(find "$APP_DIR" -maxdepth 1 -name "*.app" -type d | head -1)
          OLD_DMG=$(find "$DMG_DIR" -maxdepth 1 -name "*.dmg" | head -1 || true)
          OLD_TAR=$(find "$APP_DIR" -maxdepth 1 -name "*.app.tar.gz" ! -name "*.sig" | head -1 || true)

          echo "=== Tauri build output ==="
          echo "  app: ${APP:-<none>}"
          echo "  dmg: ${OLD_DMG:-<none>}"
          echo "  tar: ${OLD_TAR:-<none>}"

          if [[ -z "$APP" ]]; then
            echo "::error::no .app produced; nothing to re-sign"
            exit 1
          fi

          echo "=== Before re-sign ==="
          codesign -dv "$APP" 2>&1 | grep -E 'Signature|Sealed|adhoc|linker' || true

          # NOTE: do NOT pass --options runtime. Hardened runtime enables
          # library validation, which then refuses to load PyInstaller's
          # extracted Python.framework dylib because ad-hoc signatures
          # don't carry a Team ID (each blob is a different "no Team ID"
          # hash, so the dylib + parent process mismatch). Result is the
          # sidecar dies on dlopen with "code signature ... not valid for
          # use in process: mapping process and mapped file (non-platform)
          # have different Team IDs", Tauri never gets a port file, and
          # the GUI shows "Delfi took too long to start". Hardened runtime
          # is only required for Developer ID notarization (which we
          # don't do); for ad-hoc signing it's pure foot-gun.
          codesign --remove-signature "$APP" 2>/dev/null || true
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

          echo "=== After re-sign ==="
          codesign -dv "$APP" 2>&1 | grep -E 'Signature|Sealed|adhoc|linker' || true

          # Rebuild DMG from the sealed .app
          if [[ -n "$OLD_DMG" ]]; then
            DMG_NAME=$(basename "$OLD_DMG")
            rm -f "$OLD_DMG"
            STAGE="$(mktemp -d)/dmg-stage"
            mkdir -p "$STAGE"
            cp -R "$APP" "$STAGE/"
            ln -s /Applications "$STAGE/Applications"
            hdiutil create -fs HFS+ -srcfolder "$STAGE" -volname "Delfi" \
                           -format UDZO -ov -o "$DMG_DIR/$DMG_NAME"
            echo "[dmg] rebuilt $DMG_NAME"
          fi

          # Rebuild updater bundle + re-sign with minisign key
          if [[ -n "$OLD_TAR" && -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]]; then
            TAR_NAME=$(basename "$OLD_TAR")
            rm -f "$OLD_TAR" "$OLD_TAR.sig"
            ( cd "$APP_DIR" && tar -czf "$TAR_NAME" "$(basename "$APP")" )
            npx --yes @tauri-apps/cli signer sign "$APP_DIR/$TAR_NAME"
            echo "[updater] rebuilt $TAR_NAME + .sig"
          else
            echo "[updater] skipped (no original tar.gz or no TAURI_SIGNING_PRIVATE_KEY)"
          fi

      - name: List build output
        run: |
          find src-tauri/target/release/bundle -maxdepth 3 -type f \
            \( -name "*.dmg" -o -name "*.app" -o -name "*.msi" -o -name "*.exe" \) \
            -exec ls -la {} \; 2>/dev/null || true

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: delfi-macos
          path: |
            Delfibot/bot/src-tauri/target/release/bundle/dmg/*.dmg
            Delfibot/bot/src-tauri/target/release/bundle/macos/*.app
            Delfibot/bot/src-tauri/target/release/bundle/macos/*.app.tar.gz
            Delfibot/bot/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: delfi-windows
          path: |
            Delfibot/bot/src-tauri/target/release/bundle/nsis/*.exe
            Delfibot/bot/src-tauri/target/release/bundle/nsis/*.exe.sig
            Delfibot/bot/src-tauri/target/release/bundle/nsis/*.nsis.zip
            Delfibot/bot/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            Delfibot/bot/src-tauri/target/release/bundle/msi/*.msi
            Delfibot/bot/src-tauri/target/release/bundle/msi/*.msi.sig
          if-no-files-found: warn
          retention-days: 14

  # On a `v*` tag push, promote the matrix artifacts into a GitHub
  # Release so users have a stable download URL (run artifacts expire
  # after 14 days). Uses `gh` directly rather than a third-party
  # action to avoid the supply-chain surface; `gh` ships preinstalled
  # on Actions runners.
  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for `gh release create`
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: delfi-macos
          path: dist/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: delfi-windows
          path: dist/windows

      - name: Inventory release assets
        run: |
          # `.app` is a directory bundle, not a release-ready single
          # file. For Releases we want the user-facing installers
          # (.dmg / .msi / NSIS -setup.exe), plus the auto-updater
          # bundles (.app.tar.gz on mac, .nsis.zip on Windows) and
          # their .sig files.
          find dist -maxdepth 4 -type f \
            \( -name "*.dmg" -o -name "*.msi" -o -name "*-setup.exe" \
               -o -name "*.app.tar.gz" -o -name "*.nsis.zip" \
               -o -name "*.sig" \) \
            -print

      - name: Generate latest.json (Tauri updater manifest)
        # The desktop app's `tauri-plugin-updater` checks
        # https://github.com/<repo>/releases/latest/download/latest.json
        # at startup. The manifest binds each platform target to a
        # signed bundle URL. The `signature` field is the verbatim
        # contents of the corresponding `.sig` file emitted by the
        # bundler when TAURI_SIGNING_PRIVATE_KEY is set.
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          MAC_TAR=$(find dist -name "*.app.tar.gz" ! -name "*.sig" | head -1 || true)
          MAC_SIG=$(find dist -name "*.app.tar.gz.sig" | head -1 || true)
          # Windows updater bundle: prefer .nsis.zip (the Tauri 2
          # canonical updater format), fall back to the bare
          # -setup.exe if Tauri produced one without the zip.
          WIN_BUNDLE=$(find dist -name "*.nsis.zip" ! -name "*.sig" | head -1 || true)
          WIN_SIG=$(find dist -name "*.nsis.zip.sig" | head -1 || true)
          if [[ -z "$WIN_BUNDLE" ]]; then
            WIN_BUNDLE=$(find dist -name "*-setup.exe" ! -name "*.sig" | head -1 || true)
            WIN_SIG=$(find dist -name "*-setup.exe.sig" | head -1 || true)
          fi

          if [[ -z "$MAC_SIG" ]] || [[ -z "$WIN_SIG" ]]; then
            echo "::warning::missing signatures (mac=$MAC_SIG, win=$WIN_SIG)"
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY may not be set as a GH secret yet"
            find dist -type f | head -50
            # Skip manifest generation rather than failing the release;
            # the artifacts still ship, just without auto-update support.
            exit 0
          fi

          MAC_SIG_CONTENT=$(cat "$MAC_SIG")
          WIN_SIG_CONTENT=$(cat "$WIN_SIG")
          MAC_NAME=$(basename "$MAC_TAR")
          WIN_NAME=$(basename "$WIN_BUNDLE")

          mkdir -p dist
          cat > dist/latest.json <<JSON
          {
            "version": "${VERSION}",
            "notes": "See the GitHub Release page for change notes.",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_SIG_CONTENT}",
                "url": "${BASE}/${MAC_NAME}"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG_CONTENT}",
                "url": "${BASE}/${WIN_NAME}"
              }
            }
          }
          JSON
          echo "[manifest] generated dist/latest.json:"
          cat dist/latest.json

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # User-facing installers + updater bundles + manifest +
          # signatures. Anything end-users or the auto-updater
          # might need.
          mapfile -t assets < <(find dist -maxdepth 4 -type f \
            \( -name "*.dmg" -o -name "*.msi" -o -name "*-setup.exe" \
               -o -name "*.app.tar.gz" -o -name "*.nsis.zip" \
               -o -name "*.sig" -o -name "latest.json" \))
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "::error::no release-ready assets found under dist/"
            ls -la dist || true
            exit 1
          fi
          echo "[release] tag=$TAG attaching ${#assets[@]} asset(s):"
          printf '  - %s\n' "${assets[@]}"
          gh release create "$TAG" "${assets[@]}" \
            --title "$TAG" \
            --generate-notes
